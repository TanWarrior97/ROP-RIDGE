<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isolated ROP UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255,255,255, 0.1);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 10% 20%, rgba(30,58,138,0.2) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(14,165,233,0.15) 0%, transparent 50%);
        }

        .container {
            width: 95%;
            max-width: 1200px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            font-weight: 800;
            font-size: 2.2rem;
            margin-top: 0;
            background: linear-gradient(135deg, #fff, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 600;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .color-box {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }
        .color-box.red { background: #ff0000; box-shadow: 0 0 8px rgba(255,0,0,0.5); }
        .color-box.green { background: #00ff00; box-shadow: 0 0 8px rgba(0,255,0,0.5); }
        .color-box.blue { background: #0000ff; box-shadow: 0 0 8px rgba(0,0,255,0.5); }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        select, button {
            background: rgba(15, 23, 42, 0.8);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        select:hover {
            border-color: var(--accent);
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
        }

        button:hover {
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .workspace {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        @media (max-width: 1024px) {
            .workspace { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 768px) {
            .workspace { grid-template-columns: 1fr; }
        }

        .panel {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            border: 2px dashed var(--border);
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .panel h3 {
            position: absolute;
            top: 10px;
            left: 15px;
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .upload-area {
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.05);
        }

        #input-preview, #output-preview, #cumulative-preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: rgba(0,0,0,0.5);
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .loading {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ROP Segmentation</h1>
    <div class="legend">
        <span class="legend-item"><span class="color-box red"></span> Optic Disc</span>
        <span class="legend-item"><span class="color-box green"></span> Blood Vessels</span>
        <span class="legend-item"><span class="color-box blue"></span> Ridge</span>
    </div>

    <div class="controls">
        <select id="model-target">
            <option value="RIDGE" selected>Ridge Demarcation (Blue)</option>
            <option value="OD">Optic Disc (Red)</option>
            <option value="BV">Thinned Blood Vessels (Green)</option>
        </select>
        <button id="predict-btn" onclick="runInference()">Extract Structure</button>
    </div>

    <input type="file" id="file-upload" accept="image/*" style="display:none;" onchange="handleImage(this)">

    <div class="workspace">
        <div class="panel upload-area" onclick="document.getElementById('file-upload').click()">
            <h3>Original Image</h3>
            <span style="color: var(--text-muted); text-align: center; padding: 20px;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:10px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><br>
                Upload File Here
            </span>
            <img id="input-preview" alt="Input Preview">
        </div>

        <div class="panel">
            <h3 id="isolated-title">Isolated Prediction Map</h3>
            <div class="loading" id="loader"></div>
            <img id="output-preview" alt="Output Preview">
        </div>

        <div class="panel">
            <h3>Cumulative View (All)</h3>
            <div class="loading" id="loader2"></div>
            <img id="cumulative-preview" alt="Cumulative Preview">
        </div>
    </div>
</div>

<script>
    let currentFile = null;

    function handleImage(input) {
        if (input.files && input.files[0]) {
            currentFile = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('input-preview');
                img.src = e.target.result;
                img.style.opacity = '1';
                document.getElementById('output-preview').style.opacity = '0';
                document.getElementById('cumulative-preview').style.opacity = '0';
            }
            reader.readAsDataURL(currentFile);
        }
    }

    async function runInference() {
        if (!currentFile) {
            alert("Please upload an eye scan first.");
            return;
        }

        const loader = document.getElementById('loader');
        const loader2 = document.getElementById('loader2');
        const outputImg = document.getElementById('output-preview');
        const cumImg = document.getElementById('cumulative-preview');
        const targetDropdown = document.getElementById('model-target');
        const target = targetDropdown.value;
        const targetName = targetDropdown.options[targetDropdown.selectedIndex].text;
        const btn = document.getElementById('predict-btn');

        document.getElementById('isolated-title').innerText = targetName;

        loader.style.display = 'block';
        loader2.style.display = 'block';
        outputImg.style.opacity = '0';
        cumImg.style.opacity = '0';
        btn.disabled = true;
        btn.innerText = "Scaling AI to Full Resolution...";

        const formData = new FormData();
        formData.append("image", currentFile);
        formData.append("target", target);

        try {
            const response = await fetch('/api/predict', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            
            if (result.success) {
                outputImg.src = "data:image/jpeg;base64," + result.prediction_base64;
                outputImg.style.opacity = '1';
                if (result.cumulative_base64) {
                    cumImg.src = "data:image/jpeg;base64," + result.cumulative_base64;
                    cumImg.style.opacity = '1';
                }
            } else {
                alert("AI Error: " + (result.error || "Failed structure mapping."));
            }
        } catch (error) {
            alert("Server Error: Check if Flask backend is running natively.");
        } finally {
            loader.style.display = 'none';
            loader2.style.display = 'none';
            btn.disabled = false;
            btn.innerText = "Extract Structure";
        }
    }
</script>

</body>
</html>
